<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Photo Plant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <button class="reload-button" type="button" onclick="window.location.reload()">Reload</button>
    <main class="page">
      <form method="post" action="{{ url_for('update_config') }}" class="camera-grid">
        {% for camera in cameras %}
        <section class="camera-card" id="camera-{{ camera.id }}-card">
          {% if camera.latest_capture %}
          <img id="camera-{{ camera.id }}-image" class="camera-image" src="{{ url_for('serve_capture', prefix=camera.prefix, filename=camera.latest_capture) }}" alt="Latest capture for camera {{ camera.id }}" onclick="openCaptureModal({{ camera.id }})">
          {% else %}
          <div id="camera-{{ camera.id }}-placeholder" class="camera-placeholder">No capture yet</div>
          {% endif %}

          <label class="field-row">
            <span>Camera {{ camera.id }}</span>
            <input type="text" name="prefix_{{ camera.id }}" value="{{ camera.prefix }}">
          </label>

          <label class="field-row">
            <span>Interval (minutes)</span>
            <input type="number" min="1" name="interval_{{ camera.id }}" value="{{ camera.interval_minutes }}">
          </label>

          <label class="toggle">
            <input type="checkbox" name="enabled_{{ camera.id }}" {% if camera.enabled %}checked{% endif %}>
            Enabled
          </label>

          <label class="field-row">
            <span>Capture resolution</span>
            <select name="capture_resolution_{{ camera.id }}">
              {% for resolution in capture_resolutions %}
              <option value="{{ resolution }}" {% if camera.capture_resolution == resolution %}selected{% endif %}>{{ resolution }}</option>
              {% endfor %}
            </select>
          </label>

          <div id="camera-{{ camera.id }}-sequence" class="meta">Sequence: {{ camera.sequence }}</div>

          <div class="actions">
            <button type="button" onclick="captureNow({{ camera.id }})">Capture now</button>
            <button type="button" onclick="togglePreview({{ camera.id }})">Preview</button>
            <button type="button" onclick="resetSequence({{ camera.id }})">Reset sequence</button>
          </div>

          <div id="status-{{ camera.id }}" class="status"></div>
          <img id="preview-{{ camera.id }}" class="camera-image preview" alt="Preview camera {{ camera.id }}" onclick="openPreviewModal({{ camera.id }})">
        </section>
        {% endfor %}

        <div class="toolbar">
          <button type="submit">Save configuration</button>
        </div>
      </form>

      <div id="preview-modal" class="preview-modal" hidden>
        <div class="preview-modal-backdrop" onclick="closePreviewModal()"></div>
        <section class="preview-modal-panel">
          <header class="preview-modal-header">
            <h2 id="preview-modal-title">Camera preview</h2>
            <div class="preview-modal-actions">
              <button type="button" onclick="stopPreviewFromModal()">Stop preview</button>
              <button type="button" onclick="closePreviewModal()">Close</button>
            </div>
          </header>
          <img id="preview-modal-image" class="preview-modal-image" alt="Focused preview">
          <p class="preview-modal-help">Use this enlarged view to adjust framing and manual focus, then stop the preview.</p>
        </section>
      </div>
    </main>

    <script>
      let activePreviewCameraId = null
      let modalMode = null
      let modalPreviewCameraId = null
      let lastCaptures = {}
      let lastConfigRevision = null

      function ensureCameraImage(cameraId) {
        let imageEl = document.querySelector(`#camera-${cameraId}-image`)
        if (imageEl) {
          return imageEl
        }

        const placeholderEl = document.querySelector(`#camera-${cameraId}-placeholder`)
        if (!placeholderEl) {
          return null
        }

        imageEl = document.createElement('img')
        imageEl.id = `camera-${cameraId}-image`
        imageEl.className = 'camera-image'
        imageEl.alt = `Latest capture for camera ${cameraId}`
        imageEl.setAttribute('onclick', `openCaptureModal(${cameraId})`)
        placeholderEl.replaceWith(imageEl)
        return imageEl
      }

      // Poll for latest captures every 5 seconds
      async function pollLatestCaptures() {
        try {
          const response = await fetch('/latest-captures')
          const payload = await response.json()
          const captures = payload.cameras
          const configRevisionChanged = lastConfigRevision !== null && payload.config_revision !== lastConfigRevision
          lastConfigRevision = payload.config_revision
          
          // Update each camera card if there's a new capture
          for (const cameraId in captures) {
            const data = captures[cameraId]
            const sequenceEl = document.querySelector(`#camera-${cameraId}-sequence`)
            const previous = lastCaptures[cameraId]
            const prefixInput = document.querySelector(`input[name="prefix_${cameraId}"]`)
            const intervalInput = document.querySelector(`input[name="interval_${cameraId}"]`)
            const enabledInput = document.querySelector(`input[name="enabled_${cameraId}"]`)
            const resolutionInput = document.querySelector(`select[name="capture_resolution_${cameraId}"]`)

            if (configRevisionChanged) {
              if (prefixInput) {
                prefixInput.value = data.prefix
              }
              if (intervalInput) {
                intervalInput.value = data.interval_minutes
              }
              if (enabledInput) {
                enabledInput.checked = data.enabled
              }
              if (resolutionInput) {
                resolutionInput.value = data.capture_resolution
              }
            }

            if (sequenceEl) {
              sequenceEl.textContent = `Sequence: ${data.sequence}`
            }

            const changed = !previous || previous.sequence !== data.sequence || previous.filename !== data.filename || previous.prefix !== data.prefix
            if (changed && data.filename) {
              const imageEl = ensureCameraImage(cameraId)
              if (imageEl) {
                imageEl.src = `/captures/${data.prefix}/${data.filename}?t=${Date.now()}`
              }
            }

            lastCaptures[cameraId] = data
          }
        } catch (e) {
          // Polling error, ignore silently
        }
      }

      // Start polling
      pollLatestCaptures()
      setInterval(pollLatestCaptures, 5000)

      async function captureNow(cameraId) {
        const status = document.getElementById(`status-${cameraId}`)
        status.textContent = 'Saving config...'
        
        // Build form data from all cameras
        const formData = new FormData()
        document.querySelectorAll('input[name^="prefix_"]').forEach(input => {
          const id = input.name.match(/\d+/)[0]
          const prefix = document.querySelector(`input[name="prefix_${id}"]`).value
          const interval = document.querySelector(`input[name="interval_${id}"]`).value
          const enabled = document.querySelector(`input[name="enabled_${id}"]`).checked
          const captureResolution = document.querySelector(`select[name="capture_resolution_${id}"]`).value
          formData.append(`prefix_${id}`, prefix)
          formData.append(`interval_${id}`, interval)
          formData.append(`capture_resolution_${id}`, captureResolution)
          if (enabled) {
            formData.append(`enabled_${id}`, 'on')
          }
        })
        
        // Save config first
        try {
          const configResponse = await fetch('/config', {
            method: 'POST',
            body: formData
          })
          if (!configResponse.ok) {
            status.textContent = 'Error saving config (HTTP ' + configResponse.status + ')'
            return
          }
        } catch (e) {
          status.textContent = `Config error: ${e.message}`
          return
        }
        
        // Now capture
        status.textContent = 'Capturing...'
        try {
          const response = await fetch(`/capture/${cameraId}`, { method: 'POST' })
          const payload = await response.json()
          if (payload.success) {
            status.textContent = `Saved: ${payload.filename}`
            window.location.reload()
          } else {
            status.textContent = `Capture failed: ${payload.error || 'unknown error'}`
          }
        } catch (e) {
          status.textContent = `Capture error: ${e.message}`
        }
      }

      async function resetSequence(cameraId) {
        const status = document.getElementById(`status-${cameraId}`)
        status.textContent = 'Resetting sequence...'
        const response = await fetch(`/reset-sequence/${cameraId}`, { method: 'POST' })
        const payload = await response.json()
        status.textContent = payload.success
          ? 'Sequence reset to 0. Change prefix if needed before capturing again.'
          : 'Failed to reset sequence.'
        if (payload.success) {
          window.location.reload()
        }
      }

      function togglePreview(cameraId) {
        const status = document.getElementById(`status-${cameraId}`)
        const img = document.getElementById(`preview-${cameraId}`)
        const active = img.dataset.active === 'true'

        document.querySelectorAll('.preview').forEach(preview => {
          preview.style.display = 'none'
          preview.removeAttribute('src')
          preview.dataset.active = 'false'
        })

        if (activePreviewCameraId !== null && activePreviewCameraId !== cameraId) {
          const previousStatus = document.getElementById(`status-${activePreviewCameraId}`)
          if (previousStatus) {
            previousStatus.textContent = 'Preview stopped'
          }
        }

        if (active) {
          status.textContent = 'Preview stopped'
          activePreviewCameraId = null
          closePreviewModal()
          return
        }

        img.src = `/preview-stream/${cameraId}?mode=card&t=${Date.now()}`
        img.style.display = 'block'
        img.dataset.active = 'true'
        activePreviewCameraId = cameraId
        status.textContent = 'Continuous preview active'
      }

      function openPreviewModal(cameraId) {
        const preview = document.getElementById(`preview-${cameraId}`)
        if (preview.dataset.active !== 'true') {
          return
        }

        const modal = document.getElementById('preview-modal')
        const modalImage = document.getElementById('preview-modal-image')
        const modalTitle = document.getElementById('preview-modal-title')
        const stopButton = document.querySelector('.preview-modal-actions button')
        preview.removeAttribute('src')
        modal.hidden = false
        modalImage.src = `/preview-stream/${cameraId}?mode=modal&t=${Date.now()}`
        modalTitle.textContent = `Camera ${cameraId} preview`
        stopButton.hidden = false
        modalMode = 'preview'
        modalPreviewCameraId = cameraId
      }

      function openCaptureModal(cameraId) {
        const captureImage = document.getElementById(`camera-${cameraId}-image`)
        if (!captureImage || !captureImage.src) {
          return
        }

        const modal = document.getElementById('preview-modal')
        const modalImage = document.getElementById('preview-modal-image')
        const modalTitle = document.getElementById('preview-modal-title')
        const stopButton = document.querySelector('.preview-modal-actions button')
        modal.hidden = false
        modalImage.src = captureImage.src
        modalTitle.textContent = `Camera ${cameraId} capture`
        stopButton.hidden = true
        modalMode = 'capture'
      }

      function closePreviewModal() {
        const modal = document.getElementById('preview-modal')
        const modalImage = document.getElementById('preview-modal-image')
        const preview = modalPreviewCameraId !== null ? document.getElementById(`preview-${modalPreviewCameraId}`) : null
        modal.hidden = true
        modalImage.removeAttribute('src')
        if (modalMode === 'preview' && preview && modalPreviewCameraId !== null) {
          preview.src = `/preview-stream/${modalPreviewCameraId}?mode=card&t=${Date.now()}`
        }
        modalPreviewCameraId = null
        modalMode = null
      }

      function stopPreviewFromModal() {
        if (modalMode !== 'preview') {
          closePreviewModal()
          return
        }

        if (activePreviewCameraId === null) {
          closePreviewModal()
          return
        }

        togglePreview(activePreviewCameraId)
      }
    </script>
  </body>
</html>
